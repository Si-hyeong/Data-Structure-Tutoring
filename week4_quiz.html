<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSE203 Week 4 Practice Exam</title>
<style>
  :root {
    --bg: #f8f8f6; --card: #ffffff; --border: #e5e4df;
    --text: #1a1a18; --muted: #6b6b66; --hint: #9b9b96;
    --green-bg: #e1f5ee; --green-text: #085041; --green-bd: #5dcaa5;
    --blue-bg: #e6f1fb; --blue-text: #185fa5; --blue-bd: #378add;
    --amber-bg: #faeeda; --amber-text: #854f0b; --amber-bd: #ef9f27;
    --purple-bg: #eeedfe; --purple-text: #534ab7; --purple-bd: #7f77dd;
    --coral-bg: #faece7; --coral-text: #993c1d; --coral-bd: #d85a30;
    --red-bg: #fcebeb; --red-text: #501313; --red-bd: #e24b4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; }
  .wrap { max-width: 740px; margin: 0 auto; padding: 32px 16px 48px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-btn { padding: 4px 12px; border-radius: 20px; font-size: 12px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted); cursor: pointer; }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .card { background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
  .card-head { padding: 16px 18px; }
  .meta { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .qnum { font-size: 12px; color: var(--hint); margin-right: 2px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500;
    padding: 2px 9px; border-radius: 20px; }
  .topic { font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .qtext { font-size: 14px; line-height: 1.65; white-space: pre-line; }

  .options { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .opt { text-align: left; padding: 7px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); cursor: pointer; font-size: 13px;
    font-family: inherit; transition: background .15s; }
  .opt:hover { background: var(--bg); }
  .opt.correct { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-text); }
  .opt.wrong   { background: var(--red-bg);   border-color: var(--red-bd);   color: var(--red-text); }
  .opt.selected { background: var(--blue-bg); border-color: var(--blue-bd); }

  .reveal-btn { margin-top: 12px; padding: 6px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted); cursor: pointer; font-size: 13px; font-family: inherit; }
  .reveal-btn:hover { background: var(--bg); }

  .answer-box { padding: 14px 18px; border-top: 1px solid var(--border); display: none; }
  .answer-box.show { display: block; }
  .ans-label { padding: 7px 12px; border-radius: 8px; margin-bottom: 10px;
    background: var(--green-bg); border: 1px solid var(--green-bd); }
  .ans-label span:first-child { font-size: 12px; font-weight: 600; color: var(--green-text); }
  .ans-label span:last-child  { font-size: 13px; font-weight: 600; color: var(--green-text); }
  .explanation { font-size: 13px; line-height: 1.8; white-space: pre-line; color: var(--muted); }

  .footer { text-align: center; font-size: 12px; color: var(--hint); margin-top: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CSE203 Week 4 – Practice Exam</h1>
  <p class="sub">Linear Structures: List · Stack · Queue · Deque &nbsp;|&nbsp; 20 questions</p>

  <div class="filters" id="filters"></div>
  <div id="qlist"></div>
  <p class="footer" id="footer"></p>
</div>

<script>
const BADGE = {
  "True/False":        { bg:"#e1f5ee", text:"#085041", bd:"#5dcaa5" },
  "Multiple Choice":   { bg:"#e6f1fb", text:"#185fa5", bd:"#378add" },
  "Fill-in-the-blank": { bg:"#faeeda", text:"#854f0b", bd:"#ef9f27" },
  "Programming":       { bg:"#eeedfe", text:"#534ab7", bd:"#7f77dd" },
  "Draw":              { bg:"#faece7", text:"#993c1d", bd:"#d85a30" },
};

const QS = [
  { id:1, type:"True/False", topic:"Array / Memory",
    q:"In Python, a list stores actual object values directly inside the array, similar to a compact array using the array module.",
    ans:"False",
    exp:"파이썬의 list는 객체(object)에 대한 참조(reference, 포인터)를 배열에 저장합니다. 실제 값을 직접 저장하는 것은 compact array(array 모듈 사용 시)입니다. 그래서 list는 int, str, 어떤 객체든 담을 수 있지만, array 모듈은 지정된 타입 코드('i', 'd' 등)의 원시값만 저장합니다." },
  { id:2, type:"True/False", topic:"Array Complexity",
    q:"In a Python list, both data.append(value) and data.insert(0, value) have the same amortized time complexity.",
    ans:"False",
    exp:"append()는 리스트 끝에 추가하므로 상각(amortized) O(1)입니다(doubling 전략). 반면 insert(0, value)는 모든 기존 원소를 한 칸씩 오른쪽으로 밀어야 하므로 O(n)입니다. 가장 비용이 많이 드는 연산은 맨 앞에 삽입하는 경우입니다." },
  { id:3, type:"Multiple Choice", topic:"Amortized Analysis",
    q:"When using the doubling strategy for a dynamic array, what is the amortized time complexity of a single add(o) operation?",
    opts:["O(log n)","O(n)","O(1)","O(n²)"], ans:"O(1)",
    exp:"Doubling 전략에서는 배열이 꽉 찰 때마다 크기를 2배로 늘립니다. n번의 add 연산에 걸리는 총 시간 T(n)은 n + 1 + 2 + 4 + … + 2^k = 3n - 1 = O(n)입니다. 따라서 연산 1회당 평균(상각, amortized) 시간은 O(n)/n = O(1)이 됩니다." },
  { id:4, type:"Fill-in-the-blank", topic:"Incremental Strategy",
    q:"When using the incremental strategy (increase by constant c), the amortized time of add is O(___), and the total time T(n) is O(___).",
    ans:"O(n) / O(n²)",
    exp:"Incremental 전략(상수 c씩 증가)으로 k = n/c번 복사가 일어납니다. 총 비용 T(n) = n + c(1+2+…+k) = n + ck(k+1)/2 ≈ O(n²)입니다. 따라서 상각 시간은 T(n)/n = O(n)이 됩니다. Doubling의 O(1)보다 훨씬 비효율적입니다." },
  { id:5, type:"True/False", topic:"List vs Tuple",
    q:"In Python, both list and tuple support O(1) indexing (e.g., data[j]) because they are stored as arrays.",
    ans:"True",
    exp:"list와 tuple 모두 내부적으로 배열(array)로 저장됩니다. 배열은 연속된 메모리 위치를 사용하기 때문에 인덱스 j로 직접 접근(data[j])하는 것이 O(1)입니다. 메모리 시작 주소 + j × 원소크기로 바로 계산할 수 있기 때문입니다." },
  { id:6, type:"Fill-in-the-blank", topic:"Compact Array",
    q:"To create a compact array of signed integers in Python using the array module, you write:\nprimes = array('___', [2, 3, 5, 7])",
    ans:"'i'",
    exp:"Python array 모듈에서 type code 'i'는 signed int(C의 int, 최소 2바이트)를 의미합니다. 기타 주요 코드: 'b'=signed char(1B), 'd'=double(8B), 'f'=float(4B), 'l'=signed long(4B). type code는 저장할 데이터 타입을 명시합니다." },
  { id:7, type:"True/False", topic:"Three-way Disjointness",
    q:"The function disjoint2 (which checks if a==b before iterating over C) runs in O(n²) time, assuming no individual sequence contains duplicate values.",
    ans:"True",
    exp:"disjoint2에서 a==b인 경우만 C를 순회합니다. 중복값이 없다는 가정 하에, a==b가 성립하는 경우는 최대 N번(각 값이 한 번씩만 등장)입니다. 따라서 outer loop O(n²) + inner loop 최대 n번으로 전체 O(n²)입니다." },
  { id:8, type:"Programming", topic:"Stack ADT",
    q:"Complete the ArrayStack pop() method:\n\ndef pop(self):\n    if self.is_empty():\n        raise Empty('Stack is empty')\n    return self._data.___( )",
    ans:"self._data.pop()",
    exp:"Stack은 LIFO(Last In First Out) 구조로, 가장 최근에 삽입된 원소를 제거합니다. 내부적으로 Python list를 사용하므로 list의 pop()을 호출합니다. pop()은 인수 없이 호출하면 리스트의 마지막 원소를 제거하고 반환합니다. 이것이 Stack의 top 원소에 해당합니다." },
  { id:9, type:"Draw", topic:"Stack Operations",
    q:"Given an empty stack S, execute in order and write the final stack (bottom→top):\nS.push(5) → S.push(3) → S.pop() → S.push(7) → S.push(9) → S.pop() → S.push(4)",
    ans:"[5, 7, 4]  (bottom → top)",
    exp:"단계별 추적:\n1. push(5) → [5]\n2. push(3) → [5, 3]\n3. pop() → 3 제거 → [5]\n4. push(7) → [5, 7]\n5. push(9) → [5, 7, 9]\n6. pop() → 9 제거 → [5, 7]\n7. push(4) → [5, 7, 4]\n최종: bottom=5, top=4" },
  { id:10, type:"True/False", topic:"Stack Application",
    q:"The parentheses matching algorithm returns True when S.is_empty() is True at the end, meaning all opening symbols were successfully matched.",
    ans:"True",
    exp:"괄호 매칭 알고리즘(ParenMatch)에서 여는 괄호는 스택에 push, 닫는 괄호가 나오면 pop하여 대응 여부 확인. 마지막에 스택이 비어있다(is_empty()==True)면 모든 여는 괄호가 짝을 찾았다는 의미로 True를 반환합니다." },
  { id:11, type:"Multiple Choice", topic:"Infix/Postfix",
    q:"What is the correct postfix form of the infix expression: (1 + 2) * 3?",
    opts:["1 2 + 3 *","1 2 3 + *","* + 1 2 3","1 + 2 3 *"], ans:"1 2 + 3 *",
    exp:"(1+2)*3 → Postfix 변환:\n- 피연산자 순서대로: 1, 2 출력\n- 괄호 닫히면 + 출력: 1 2 +\n- 마지막 * 출력: 1 2 + 3 *\n평가: 스택에 1,2 push → + pop 2개 → 3 push → push 3 → * pop 2개 → 9" },
  { id:12, type:"Programming", topic:"Queue ADT",
    q:"In ArrayQueue.dequeue(), why is the modulo (%) operator used?\n\nself._front = (self._front + 1) % len(self._data)",
    ans:"Circular array (순환 배열) 구현 — 인덱스가 끝에 도달하면 0으로 wrap around",
    exp:"단순히 _front를 증가시키면 배열 끝에 도달 후 앞부분 공간이 낭비됩니다. %를 사용하면 인덱스가 배열 끝을 넘을 때 자동으로 0으로 돌아옵니다. 예: _front=9, len=10 → (9+1)%10=0. 이로써 배열 공간을 효율적으로 재사용합니다." },
  { id:13, type:"True/False", topic:"Queue ADT",
    q:"In the Queue ADT, enqueue() adds an element at the front, and dequeue() removes an element from the rear.",
    ans:"False",
    exp:"Queue는 FIFO(First In First Out) 구조입니다. enqueue()는 rear(뒤)에 추가하고, dequeue()는 front(앞)에서 제거합니다. ATM 줄 서기를 생각하면 됩니다: 새로운 사람은 줄 끝에(enqueue at rear), 서비스는 맨 앞에서(dequeue from front)." },
  { id:14, type:"Fill-in-the-blank", topic:"Queue Implementation",
    q:"In ArrayQueue.enqueue(), the rear slot index is:\navail = (self._front + self._size) % len(self._data)\nWhat does this formula compute?",
    ans:"다음 원소를 삽입할 순환 배열 상의 rear(뒤) 인덱스",
    exp:"_front는 첫 원소 인덱스, _size는 현재 원소 수. _front + _size = 다음 삽입 위치. %로 순환 배열에서 올바른 인덱스를 구합니다. 예: _front=3, _size=4, len=10 → avail=(3+4)%10=7." },
  { id:15, type:"Multiple Choice", topic:"Deque ADT",
    q:"Which of the following is NOT a standard operation of the Deque (Double-Ended Queue) ADT?",
    opts:["add_first(object)","delete_last()","peek_middle()","last()"], ans:"peek_middle()",
    exp:"Deque의 표준 연산은 양쪽 끝에서만 이루어집니다:\nadd_first / add_last / delete_first / delete_last / first() / last()\npeek_middle()은 중간 원소 조회로 Deque ADT의 표준 연산이 아닙니다." },
  { id:16, type:"Programming", topic:"Spans Algorithm",
    q:"In spans2 (O(n) algorithm), why is the while-loop inside the for-loop NOT making the overall complexity O(n²)? Explain using push/pop counts.",
    ans:"각 인덱스는 정확히 1번 push, 최대 1번 pop → 총 스택 연산 ≤ 2n = O(n)",
    exp:"spans2에서 인덱스 i는 항상 정확히 1번 push됩니다. while 루프에서 pop되더라도 한 번 pop된 인덱스는 다시 push되지 않습니다. 따라서 총 push 횟수=n, pop 횟수≤n → 전체 스택 연산≤2n=O(n). while이 중첩되어 있어도 O(n²)이 아닌 이유가 바로 이것(상각 분석, amortized analysis)입니다." },
  { id:17, type:"Draw", topic:"Spans",
    q:"Given X = [3, 1, 4, 2, 5], compute the span array S where S[i] = count of consecutive preceding elements ≤ X[i], including X[i] itself.",
    ans:"S = [1, 1, 3, 1, 5]",
    exp:"S[0]: X[0]=3, 앞 없음 → 1\nS[1]: X[1]=1, X[0]=3>1 → 1\nS[2]: X[2]=4, X[1]=1≤4, X[0]=3≤4 → 2+1=3\nS[3]: X[3]=2, X[2]=4>2 → 1\nS[4]: X[4]=5, X[3]=2, X[2]=4, X[1]=1, X[0]=3 모두 ≤5 → 4+1=5" },
  { id:18, type:"True/False", topic:"Stack – Postfix",
    q:"To evaluate a postfix expression, when an operator is encountered, exactly two operands are popped from the stack, the operation is performed, and the result is pushed back.",
    ans:"True",
    exp:"Postfix 평가 알고리즘:\n1. 피연산자 → 스택에 push\n2. 연산자 → 스택에서 2개 pop → 연산 → 결과 push\n이진 연산자는 피연산자 2개가 필요하므로 정확히 2개 pop. 예: '3 4 + 2 *' → push3, push4, pop→3+4=7 push, push2, pop→7*2=14 push → 결과14" },
  { id:19, type:"Multiple Choice", topic:"Round Robin",
    q:"A Round Robin Scheduler uses a Queue [P1, P2, P3] (P1 at front). What is the queue state after P1 is serviced once?",
    opts:["[P1, P2, P3]","[P2, P3, P1]","[P3, P2, P1]","[P1, P3, P2]"], ans:"[P2, P3, P1]",
    exp:"Round Robin 동작:\n1. e = Q.dequeue() → P1 제거 → 큐: [P2, P3]\n2. P1 서비스 실행\n3. Q.enqueue(P1) → P1을 rear에 추가 → 큐: [P2, P3, P1]\nQueue의 FIFO 특성이 순서를 보장합니다." },
  { id:20, type:"Programming", topic:"HTML Tag Matching",
    q:"In is_matched_html(), what does `tag[1:] != S.pop()` check, and what does the function return when this condition is True?",
    ans:"닫는 태그 이름이 가장 최근 여는 태그와 다른지 확인 → False 반환 (mismatch)",
    exp:"HTML 태그 매칭에서:\n- 여는 태그 예: 'body' → push('body')\n- 닫는 태그 예: '/body' → tag[1:]='body'\n- S.pop()으로 최근 여는 태그와 비교\n- 다르면(예: div 열고 span으로 닫으면) → False\n올바른 HTML은 가장 최근에 열린 태그가 가장 먼저 닫혀야 합니다(LIFO 특성)." },
];

const types = ["All", ...Object.keys(BADGE)];
let activeType = "All";
let selected = {};
let revealed = {};

function render() {
  const filtered = activeType === "All" ? QS : QS.filter(q => q.type === activeType);
  document.getElementById("footer").textContent = `총 ${filtered.length}문제`;

  // filters
  const fEl = document.getElementById("filters");
  fEl.innerHTML = "";
  types.forEach(t => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (activeType === t ? " active" : "");
    b.textContent = t;
    b.onclick = () => { activeType = t; render(); };
    fEl.appendChild(b);
  });

  // questions
  const ql = document.getElementById("qlist");
  ql.innerHTML = "";
  filtered.forEach((q, fi) => {
    const globalIdx = QS.indexOf(q);
    const card = document.createElement("div");
    card.className = "card";

    const c = BADGE[q.type];
    const badgeStyle = `background:${c.bg};color:${c.text};border:1px solid ${c.bd}`;

    let optsHtml = "";
    if (q.opts) {
      optsHtml = `<div class="options">` + q.opts.map(o => {
        let cls = "opt";
        if (revealed[globalIdx]) {
          if (o === q.ans) cls += " correct";
          else if (selected[globalIdx] === o) cls += " wrong";
        } else if (selected[globalIdx] === o) cls += " selected";
        return `<button class="${cls}" data-qi="${globalIdx}" data-opt="${o}">${o}</button>`;
      }).join("") + `</div>`;
    }

    const revLabel = revealed[globalIdx] ? "답 숨기기 ▲" : "정답 & 해설 보기 ▼";
    const ansShow = revealed[globalIdx] ? "answer-box show" : "answer-box";

    card.innerHTML = `
      <div class="card-head">
        <div class="meta">
          <span class="qnum">Q${globalIdx + 1}</span>
          <span class="badge" style="${badgeStyle}">${q.type}</span>
          <span class="topic">${q.topic}</span>
        </div>
        <p class="qtext">${q.q}</p>
        ${optsHtml}
        <button class="reveal-btn" data-qi="${globalIdx}">${revLabel}</button>
      </div>
      <div class="${ansShow}" id="ans-${globalIdx}">
        <div class="ans-label">
          <span>정답: </span><span>${q.ans}</span>
        </div>
        <p class="explanation">${q.exp}</p>
      </div>`;

    ql.appendChild(card);
  });

  // event delegation
  ql.querySelectorAll(".opt").forEach(b => {
    b.onclick = () => {
      const qi = +b.dataset.qi;
      selected[qi] = b.dataset.opt;
      render();
    };
  });
  ql.querySelectorAll(".reveal-btn").forEach(b => {
    b.onclick = () => {
      const qi = +b.dataset.qi;
      revealed[qi] = !revealed[qi];
      render();
    };
  });
}

render();
</script>
</body>
</html>
